<html>
  <head>
    <meta charset="utf-8" />

    <title>LDI - Comércio de produtos eletrônicos LTDA</title>

    <link href="includes/estilo.css" rel="stylesheet" />
    <script src="https://unpkg.com/@ruffle-rs/ruffle"></script>
    <script>
      window.RufflePlayer.config = {
        autoplay: "on",
        unmuteOverlay: "hidden",
        splashScreen: false,
      };

      window.addEventListener("DOMContentLoaded", async () => {
        const ruffle = window.RufflePlayer.newest();
        const player = ruffle.createPlayer();

        player.style.width = 1024;
        player.style.height = 600;

        const container = document.getElementById("flash-container");
        container.appendChild(player);

        try {
          // player.load returns a Promise
          await player.load("estrutura/abertura_11.swf");

          const loader = document.getElementById("loader");
          loader.style.opacity = "0";

          // Remove from DOM entirely after CSS transition concludes
          setTimeout(() => loader.remove(), 500);
          setTimeout(() => window.location = 'index.php.html', 3000);
          document.getElementById("creditos").style.display = "block";
        } catch (error) {
          console.error(error);
        }
      });
    </script>
  </head>

  <body
    bgcolor="#FFFFFF"
    text="#000000"
    leftmargin="0"
    topmargin="0"
    marginwidth="0"
    marginheight="0"
  >
    <div id="player-wrapper">
      <div id="loader">
        <div class="spinner"></div>
        <p>Carregando...</p>
      </div>
      <div id="flash-container"></div>
    </div>
  </body>
</html>
